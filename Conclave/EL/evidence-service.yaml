  /approvals:
    get:
      tags:
      - approval
      summary: Get all approvals
      operationId: getApprovals
      parameters:
      - name: sort
        in: query
        description: Column to sort results by.
        required: false
        style: form
        explode: true
        schema:
          type: string
          example: sort=user_id OR sort=validity:DESC
          default: sort=approval_id
      - name: search
        in: query
        description: Term to search for in all columns of a resourse. Search terms
          should be comma separated.
        required: false
        style: form
        explode: true
        schema:
          type: string
          example: search=insurance,amount
      - name: where
        in: query
        description: Return specific column that matches the where clause.
        required: false
        style: form
        explode: true
        schema:
          type: string
          example: user_id=99 OR status=DRAFT
      - name: limit
        in: query
        description: Maximum number of items to return.
        required: false
        style: form
        explode: true
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          default: 20
      - name: offset
        in: query
        description: Number of items to skip before returning the results.
        required: false
        style: form
        explode: true
        schema:
          minimum: 0
          type: integer
          format: int32
          default: 0
      responses:
        "200":
          description: Result returned.
          content:
            application/json:
              schema:
                $ref: '#/components/responses/200ApiCode'
        '400':
